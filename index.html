<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For NeathNeath ❤️</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
height:100vh;
background:radial-gradient(circle,#200000,#000);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
font-family:Georgia, serif;
}

/* BIG WHITE HEART */
.heart-main{
font-size:220px;
color:white;
text-shadow:0 0 30px white,0 0 60px pink;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* floating hearts */
.heart{
position:absolute;
color:#ff4d6d;
font-size:22px;
animation:float 6s linear forwards;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-700px);opacity:0}
}

/* sparkles */
.spark{
position:absolute;
width:3px;
height:3px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0}
50%{opacity:1}
}

/* message */
.message{
margin-top:40px;
font-size:28px;
max-width:80%;
text-align:center;
border-right:2px solid white;
white-space:pre-wrap;
overflow:hidden;
}

</style>
</head>

<body>

<div class="heart-main">🤍</div>

<div id="text" class="message"></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9d3c6c.mp3">
</audio>

<script>

/* play music on first click */
document.body.addEventListener("click",()=>{
document.getElementById("music").play();
},{once:true});

/* floating hearts */
function heart(){
const h=document.createElement("div");
h.className="heart";
h.innerHTML="❤";
h.style.left=Math.random()*100+"vw";
h.style.bottom="0";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
}

setInterval(heart,400);

/* sparkles */
for(let i=0;i<40;i++){
const s=document.createElement("div");
s.className="spark";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*2+"s";
document.body.appendChild(s);
}

/* message typing */
const msg=`I love you so much Neath ❤️

You are my one and only.
I love everything about you,
and I will do anything to keep you around me.
I love you so so muchhhhh muahhhhhhhhhhhhh i loveee youuuuu bbyyyy girllllllll.
My bbyyyy girl sl me ottt

17/09/25 🤍`;

let i=0;
const text=document.getElementById("text");

function type(){
if(i<msg.length){
text.textContent+=msg.charAt(i);
i++;
setTimeout(type,60);
}
}

setTimeout(type,2000);

</script>

</body>
</html>
